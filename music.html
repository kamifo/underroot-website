<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Underroot - Music</title>
  <link rel="icon" type="image/png" href="assets/images/underroot_favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }

    /* ── Crossfading backgrounds ─────────────────────────────────────────── */
    .bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .bg.active { opacity: 1; }
    #bg-village    { background-image: url('assets/images/The_Village.png'); }
    #bg-underground { background-image: url('assets/images/Underground.png'); }
    #bg-maw        { background-image: url('assets/images/The_Maw.png'); }

    /* Dark overlay so UI stays readable */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    canvas { position: absolute; top: 0; left: 0; }

    /* ── Player UI ───────────────────────────────────────────────────────── */
    #player {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      z-index: 5;
      width: min(600px, 92vw);
    }

    #now-playing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #now-label {
      font-family: 'Georgia', serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }
    #track-name {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.7rem, 2vw, 1rem);
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.08em;
      text-align: center;
      min-height: 1.4em;
    }

    /* ── Progress bar ────────────────────────────────────────────────────── */
    #progress-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      position: relative;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.6);
      transition: width 0.25s linear;
      pointer-events: none;
    }
    .time-label {
      font-family: 'Georgia', serif;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.05em;
      white-space: nowrap;
      min-width: 36px;
    }
    #time-current { text-align: right; }
    #time-total   { text-align: left; }

    /* ── Track buttons ───────────────────────────────────────────────────── */
    #tracks {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .track-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 16px 10px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 2px;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      font-family: 'Georgia', serif;
      font-size: clamp(10px, 1.8vw, 13px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      user-select: none;
    }
    .track-btn:hover { background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.85); }
    .track-btn.active {
      border-width: 1px;
      color: #fff;
    }
    .track-btn[data-index="0"].active { background: rgba(163,105,54,0.35); border-color: #a36936; }
    .track-btn[data-index="1"].active { background: rgba(148,158,168,0.25); border-color: #949ea8; }
    .track-btn[data-index="2"].active { background: rgba(140,40,40,0.35);   border-color: #8c2828; }

    .track-num {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.6rem, 1.8vw, 0.85rem);
    }
    .track-btn[data-index="0"] .track-num { color: #a36936; }
    .track-btn[data-index="1"] .track-num { color: #949ea8; }
    .track-btn[data-index="2"] .track-num { color: #8c2828; }

    .track-icon { font-size: 16px; opacity: 0.7; }
    .track-btn.active .track-icon { opacity: 1; }

    /* ── Bottom buttons ──────────────────────────────────────────────────── */
    .corner-btn {
      position: fixed;
      bottom: 28px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 2px;
      padding: 8px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.75);
      font-family: 'Georgia', serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-decoration: none;
      user-select: none;
      transition: background 0.2s, color 0.2s;
    }
    .corner-btn:hover { background: rgba(0,0,0,0.65); color: #fff; }
    .corner-btn svg   { flex-shrink: 0; }
    #back-btn  { left: 28px; }
    #mute-btn  { right: 28px; }
  </style>
</head>
<body>

  <!-- Backgrounds -->
  <div id="bg-village"     class="bg"></div>
  <div id="bg-underground" class="bg"></div>
  <div id="bg-maw"         class="bg"></div>
  <div id="overlay"></div>

  <canvas id="c"></canvas>

  <!-- Player -->
  <div id="player">
    <div id="now-playing">
      <span id="now-label">Now Playing</span>
      <span id="track-name">—</span>
    </div>

    <div id="progress-wrap">
      <span class="time-label" id="time-current">0:00</span>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <span class="time-label" id="time-total">0:00</span>
    </div>

    <div id="tracks">
      <button class="track-btn" data-index="0">
        <span class="track-num">01</span>
        <span class="track-icon">▶</span>
        <span>The Village</span>
      </button>
      <button class="track-btn" data-index="1">
        <span class="track-num">02</span>
        <span class="track-icon">▶</span>
        <span>Underground</span>
      </button>
      <button class="track-btn" data-index="2">
        <span class="track-num">03</span>
        <span class="track-icon">▶</span>
        <span>The Maw</span>
      </button>
    </div>
  </div>

  <audio id="bgm" preload="none"></audio>

  <!-- Back to main -->
  <a id="back-btn" class="corner-btn" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </a>

  <!-- Mute -->
  <button id="mute-btn" class="corner-btn" aria-label="Toggle music">
    <svg id="icon-sound" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <svg id="icon-mute" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
    <span id="mute-label">Mute</span>
  </button>

  <script>
    // ── Track data ────────────────────────────────────────────────────────────
    const TRACKS = [
      { name: 'The Village',  src: 'assets/music/Underroot_3.mp3', bg: 'bg-village'     },
      { name: 'Underground',  src: 'assets/music/Underroot_1.mp3', bg: 'bg-underground' },
      { name: 'The Maw',      src: 'assets/music/Underroot_2.mp3', bg: 'bg-maw'         },
    ];

    const bgm          = document.getElementById('bgm');
    const trackNameEl  = document.getElementById('track-name');
    const progressFill = document.getElementById('progress-fill');
    const progressBar  = document.getElementById('progress-bar');
    const timeCurrent  = document.getElementById('time-current');
    const timeTotal    = document.getElementById('time-total');
    const trackBtns    = Array.from(document.querySelectorAll('.track-btn'));
    const bgEls        = { 'bg-village': document.getElementById('bg-village'), 'bg-underground': document.getElementById('bg-underground'), 'bg-maw': document.getElementById('bg-maw') };

    let currentIndex = -1;
    let muted = false;

    // ── Helpers ───────────────────────────────────────────────────────────────
    function fmtTime(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2,'0')}`;
    }

    // ── Play a track ──────────────────────────────────────────────────────────
    function playTrack(index) {
      const track = TRACKS[index];

      // Swap background
      Object.values(bgEls).forEach(el => el.classList.remove('active'));
      bgEls[track.bg].classList.add('active');

      // Update buttons
      trackBtns.forEach(btn => {
        const isActive = parseInt(btn.dataset.index) === index;
        btn.classList.toggle('active', isActive);
        btn.querySelector('.track-icon').textContent = isActive ? '■' : '▶';
      });

      // If same track clicked while playing — toggle pause/play
      if (index === currentIndex && !bgm.paused) {
        bgm.pause();
        trackBtns[index].querySelector('.track-icon').textContent = '▶';
        return;
      }
      if (index === currentIndex && bgm.paused) {
        bgm.play().catch(() => {});
        trackBtns[index].querySelector('.track-icon').textContent = '■';
        return;
      }

      currentIndex = index;
      bgm.src = track.src;
      bgm.load();
      bgm.volume = 0.7;
      bgm.muted  = muted;
      bgm.play().catch(() => {});
      trackNameEl.textContent = track.name;
    }

    trackBtns.forEach(btn => btn.addEventListener('click', () => playTrack(parseInt(btn.dataset.index))));

    // Auto-advance to next track
    bgm.addEventListener('ended', () => {
      const next = (currentIndex + 1) % TRACKS.length;
      playTrack(next);
    });

    // ── Progress bar ──────────────────────────────────────────────────────────
    bgm.addEventListener('timeupdate', () => {
      if (!bgm.duration) return;
      const pct = (bgm.currentTime / bgm.duration) * 100;
      progressFill.style.width = pct + '%';
      timeCurrent.textContent  = fmtTime(bgm.currentTime);
    });
    bgm.addEventListener('loadedmetadata', () => {
      timeTotal.textContent = fmtTime(bgm.duration);
    });
    progressBar.addEventListener('click', e => {
      if (!bgm.duration) return;
      const rect = progressBar.getBoundingClientRect();
      bgm.currentTime = ((e.clientX - rect.left) / rect.width) * bgm.duration;
    });

    // ── Mute ─────────────────────────────────────────────────────────────────
    const muteBtn   = document.getElementById('mute-btn');
    const iconSound = document.getElementById('icon-sound');
    const iconMute  = document.getElementById('icon-mute');
    const muteLabel = document.getElementById('mute-label');

    muteBtn.addEventListener('click', () => {
      muted = !muted;
      bgm.muted = muted;
      iconSound.style.display = muted ? 'none' : '';
      iconMute.style.display  = muted ? ''     : 'none';
      muteLabel.textContent   = muted ? 'Unmute' : 'Mute';
    });

    // ── Particles (same system as main page) ──────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const PCOLS  = ['138,138,128','148,158,168','163,105,54','133,87,41','140,40,40'];
    let particles = [], lastTs = 0;

    function spawnParticle(randomY) {
      return { x: Math.random()*canvas.width, y: randomY ? Math.random()*canvas.height : canvas.height+4,
        vx:(Math.random()-0.5)*0.35, vy:-(0.25+Math.random()*0.45),
        size:0.7+Math.random()*1.6, opacity:0, maxOp:0.08+Math.random()*0.22,
        col:PCOLS[Math.floor(Math.random()*PCOLS.length)] };
    }

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      particles = Array.from({ length: 65 }, () => spawnParticle(true));
    }

    function render(ts) {
      const dt = Math.min((ts - lastTs) / 16.67, 3);
      lastTs = ts;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx += (Math.random()-0.5)*0.015*dt;
        p.vx = Math.max(-0.55, Math.min(0.55, p.vx));
        p.opacity = Math.min(p.maxOp, p.opacity + 0.004*dt);
        if (p.y < -6 || p.x < -6 || p.x > canvas.width+6) {
          particles[i] = spawnParticle(false);
          particles[i].x = Math.random()*canvas.width;
          continue;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${p.col},${p.opacity})`;
        ctx.fill();
      }
      requestAnimationFrame(render);
    }

    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 150); });
    resize();
    requestAnimationFrame(render);
  </script>
</body>
</html>
