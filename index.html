<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Underroot</title>
  <link rel="icon" type="image/png" href="assets/images/underroot_favicon.png" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-image: url('assets/images/Underroot_website_background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #coming-soon {
      font-family: 'Georgia', serif;
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #ffffff;
      text-shadow:
        0 0 20px rgba(255, 255, 255, 0.6),
        0 0 60px rgba(255, 255, 255, 0.2);
      user-select: none;
      position: relative;
      filter: blur(0px);
      opacity: 1;
    }

    /* Vaporize: text breaks apart upward like smoke */
    #coming-soon.vaporize {
      animation: vaporize 2.5s ease-out forwards;
    }

    @keyframes vaporize {
      0% {
        opacity: 1;
        filter: blur(0px);
        transform: translateY(0) scale(1);
        text-shadow:
          0 0 20px rgba(255, 255, 255, 0.6),
          0 0 60px rgba(255, 255, 255, 0.2);
      }
      30% {
        opacity: 0.8;
        filter: blur(2px);
        transform: translateY(-10px) scale(1.03);
        text-shadow:
          0 0 40px rgba(255, 255, 255, 0.8),
          0 0 100px rgba(255, 255, 255, 0.4);
      }
      100% {
        opacity: 0;
        filter: blur(40px);
        transform: translateY(-80px) scale(1.3);
        text-shadow:
          0 0 80px rgba(255, 255, 255, 0),
          0 0 0px rgba(255, 255, 255, 0);
      }
    }
  </style>
</head>
<body>
  <span id="coming-soon">Coming Soon...</span>

  <script>
    setTimeout(function () {
      document.getElementById('coming-soon').classList.add('vaporize');
    }, 5000);
  </script>
</body>
</html>
